# =============================================================================
# MyApi CI Pipeline
# Runs lint, type-check, tests, security checks on every push and pull request.
# Hardening owners: .context/decisions/ADR-0008-npm-audit-blocks-high.md
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Lint (backend + frontend)
  # ===========================================================================
  lint-backend:
    name: Lint backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NOTE: non-blocking until the legacy-monolith lint backlog is paid down.
      # Baseline 2026-04-21: 243 problems (112 errors / 131 warnings).
      # Policy: every PR must leave the number lower than the previous run;
      # a ratchet script + blocking gate will land under M14 / CI hardening.
      - name: ESLint (backend) — report-only
        run: npm run lint:backend
        continue-on-error: true

      - name: Prettier check — report-only
        run: npm run format:check
        continue-on-error: true

  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: src/public/dashboard-app
        run: npm ci

      - name: Lint frontend
        working-directory: src/public/dashboard-app
        run: npm run lint

  # ===========================================================================
  # TypeScript type-check (runs against checkJs config)
  # ===========================================================================
  typecheck:
    name: Type-check (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NOTE: non-blocking until the legacy-JS typecheck backlog is paid down.
      # Baseline 2026-04-21: 739 `error TS*` diagnostics under strict `checkJs`.
      # The number drops as modules in `src/domain/` and `src/infra/*` convert
      # to native .ts under M7. A ratchet script + blocking gate lands in M14.
      - name: tsc --noEmit — report-only
        run: npm run typecheck
        continue-on-error: true

  # ===========================================================================
  # Backend Tests
  # ===========================================================================
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test ${{ matrix.node-version == '22' && '--coverage' || '' }}
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-ci
          ENCRYPTION_KEY: test-encryption-key-32chars!!
          SESSION_SECRET: test-session-secret-ci
          VAULT_KEY: test-vault-key-ci-32characters!
          DB_PATH: ':memory:'

      - name: Upload coverage
        if: matrix.node-version == '22' && always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ===========================================================================
  # Security Audit
  # Policy: block on HIGH+ advisories (.context/decisions/ADR-0008-...).
  # If a HIGH lands on a transitive dep with no exploitable path, suppress via
  # `package.json` `overrides` or file a dated note under .context/decisions/
  # — never re-introduce `|| true` here.
  # ===========================================================================
  security:
    name: Security audit (blocks on HIGH+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (blocks at HIGH+)
        run: npm audit --audit-level=high

  # ===========================================================================
  # Docker Build Validation
  # ===========================================================================
  docker:
    name: Docker Build
    # `lint-backend` and `typecheck` are report-only today (see job comments);
    # the hard gates that must pass before a Docker build are tests + security.
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create placeholder connector dist dirs
        run: mkdir -p connectors/afp-daemon/dist connectors/afp-oauth/dist

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Dockerfile
          push: false
          tags: myapi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
